name: Grant AI Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 👈 IMPORTANT (allow push)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run script
        run: python app/main.py
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

      # 👇 NEW STEP: commit updated file
      - name: Commit and push sent_grants.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sent_grants.json
          git commit -m "update sent grants" || echo "No changes"
          git push
